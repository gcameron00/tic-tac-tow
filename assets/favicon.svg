<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .grid { stroke: #2563eb; }
    .x { stroke: #2563eb; }
    .o { stroke: #e11d48; }
    @media (prefers-color-scheme: dark) {
      .grid { stroke: #60a5fa; }
      .x { stroke: #60a5fa; }
      .o { stroke: #fb7185; }
    }
  </style>
  <g fill="none" stroke-width="2" stroke-linecap="round">
    <!-- grid -->
    <g class="grid">
      <line x1="12" y1="3" x2="12" y2="29" />
      <line x1="20" y1="3" x2="20" y2="29" />
      <line x1="3" y1="12" x2="29" y2="12" />
      <line x1="3" y1="20" x2="29" y2="20" />
    </g>
    <!-- an X in the top-left cell -->
    <g class="x" stroke-width="2.4">
      <line x1="5.5" y1="5.5" x2="9.5" y2="9.5" />
      <line x1="9.5" y1="5.5" x2="5.5" y2="9.5" />
    </g>
    <!-- an O in the center cell -->
    <circle class="o" cx="16" cy="16" r="2.6" stroke-width="2.4" />
  </g>
</svg>
